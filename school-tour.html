<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>School Tour – NEMPS Bidar</title>
  <meta name="description" content="Take a virtual tour of NEMPS Bidar.">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="assets/js/theme.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&family=Open+Sans:wght@600;700;800&family=Ubuntu:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
  <link rel="icon" href="assets/img/cropped-nemps-logo.png">
  <script defer src="assets/js/components.js"></script>
</head>
<body>
  <section class="relative bg-navy text-white">
    <img src="assets/img/nemps-new-10.webp" alt="" class="absolute inset-0 w-full h-full object-cover">
    <!-- dark overlay so text stays readable -->
    <div class="absolute inset-0 bg-navy/55"></div>
    <div class="absolute inset-0 opacity-20" style="background:radial-gradient(circle at 80% 20%, #c31432 0, transparent 45%), radial-gradient(circle at 10% 90%, #240b36 0, transparent 40%)"></div>
    <div class="relative max-w-site mx-auto px-4 lg:px-6 py-16 lg:py-20 text-center">
      <h1 class="font-head font-extrabold text-4xl lg:text-5xl">School Tour</h1>
      <nav class="mt-4 text-sm text-white/60 font-head"><a href="index.html" class="hover:text-green">Home</a> &nbsp;/&nbsp; <span class="text-green">School Tour</span></nav>
    </div>
  </section>
  <section class="py-16 lg:py-20">
    <div class="max-w-site mx-auto px-4 lg:px-6">
      <div class="max-w-2xl mb-10 reveal"><p class="eyebrow mb-3">Visit Inside School</p><h2 class="font-head font-extrabold text-3xl text-navy">Explore our campus</h2><p class="text-body mt-3">Take a look around National English Medium Public School — our classrooms, labs, library and play areas.</p></div>
      <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-5" id="tourGrid"></div>
    </div>
  </section>
  <script>
    const t=['DevaDeva-Vana2.webp','DevaDeva-Vana.webp','DevaDeva-Vana3.webp','DevaDeva-Vana4.webp','picnic1-scaled.webp','picnic2-scaled.webp','picnic3-scaled.webp','picnic4-scaled.webp','picnic5-scaled.webp','picnic6-scaled.webp','picnic7-scaled.webp','picnic8.webp'];
    document.getElementById('tourGrid').innerHTML=t.map(f=>`<div class="overflow-hidden rounded-xl border border-line hover-card reveal in"><img src="assets/img/${f}" loading="lazy" class="w-full h-56 object-cover zoomimg" alt="Campus"></div>`).join('');
  </script>

</body>
</html>
