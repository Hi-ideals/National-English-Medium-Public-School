<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Events – NEMPS Bidar</title>
  <meta name="description" content="Upcoming and recent events at NEMPS Bidar.">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="assets/js/theme.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&family=Open+Sans:wght@600;700;800&family=Ubuntu:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
  <link rel="icon" href="assets/img/cropped-nemps-logo.png">
  <script defer src="assets/js/components.js"></script>
</head>
<body>
  <section class="relative bg-navy text-white">
    <img src="assets/img/nemps-new-10.webp" alt="" class="absolute inset-0 w-full h-full object-cover">
    <!-- dark overlay so text stays readable -->
    <div class="absolute inset-0 bg-navy/55"></div>
    <div class="absolute inset-0 opacity-20" style="background:radial-gradient(circle at 80% 20%, #c31432 0, transparent 45%), radial-gradient(circle at 10% 90%, #240b36 0, transparent 40%)"></div>
    <div class="relative max-w-site mx-auto px-4 lg:px-6 py-16 lg:py-20 text-center">
      <h1 class="font-head font-extrabold text-4xl lg:text-5xl">Events</h1>
      <nav class="mt-4 text-sm text-white/60 font-head"><a href="index.html" class="hover:text-green">Home</a> &nbsp;/&nbsp; <span class="text-green">Events</span></nav>
    </div>
  </section>
  <section class="py-16 lg:py-20">
    <div class="max-w-site mx-auto px-4 lg:px-6">
      <div class="max-w-2xl mb-10 reveal"><p class="eyebrow mb-3">School Events</p><h2 class="font-head font-extrabold text-3xl text-navy">Recent & upcoming events</h2></div>
      <div class="space-y-5" id="ev"></div>
      <p class="mt-8 text-sm text-body reveal">Looking for event photos? Visit the <a href="gallery.html" class="text-brand font-semibold">Photo Gallery</a>.</p>
    </div>
  </section>
  <script>
    const e=[['15 Aug 2026','Independence Day Celebration','Flag hoisting, patriotic songs and cultural performances.','nemps-new.webp'],['5 Sep 2025',"Teachers' Day",'Honouring our dedicated teachers.','Teachers-1-scaled.webp'],['Aug 2025','Janmashtami Celebration','Krishna Janmashtami celebrated with devotion and joy.','Krishna-1.webp'],['26 Jan 2026','Republic Day','March-past and patriotic fervour.','ne.20.jpg'],['21 Jun 2026','International Yoga Day','Promoting health and mindfulness.','nemps-new-5.webp']];
    document.getElementById('ev').innerHTML=e.map(([d,t,desc,f])=>`<div class="flex flex-col sm:flex-row gap-5 bg-soft border border-line rounded-xl overflow-hidden hover-card reveal in"><img src="assets/img/${f}" class="w-full sm:w-56 h-44 object-cover" alt="${t}"><div class="p-5"><span class="inline-block bg-brand text-white text-xs font-head font-semibold px-3 py-1 rounded-full mb-2">${d}</span><h3 class="font-head font-bold text-navy text-xl mb-1">${t}</h3><p class="text-sm text-body">${desc}</p></div></div>`).join('');
  </script>

</body>
</html>
