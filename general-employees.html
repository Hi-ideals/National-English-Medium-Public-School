<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>General Employees – NEMPS Bidar</title>
  <meta name="description" content="General Employees of National English Medium Public School, Bidar — support staff roster with names, date of joining and designation.">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="assets/js/theme.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&family=Open+Sans:wght@600;700;800&family=Ubuntu:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
  <link rel="icon" href="assets/img/cropped-nemps-logo.png">
  <script defer src="assets/js/components.js"></script>
</head>
<body>

  <section class="relative bg-navy text-white">
    <img src="assets/img/nemps-new-10.webp" alt="" class="absolute inset-0 w-full h-full object-cover">
    <!-- dark overlay so text stays readable -->
    <div class="absolute inset-0 bg-navy/55"></div>
    <div class="absolute inset-0 opacity-20" style="background:radial-gradient(circle at 80% 20%, #c31432 0, transparent 45%), radial-gradient(circle at 10% 90%, #240b36 0, transparent 40%)"></div>
    <div class="relative max-w-site mx-auto px-4 lg:px-6 py-16 lg:py-20 text-center">
      <h1 class="font-head font-extrabold text-4xl lg:text-5xl">General Employees</h1>
      <p class="mt-4 text-white/70 max-w-2xl mx-auto">A roster of staff members employed at National English Medium Public School in support roles.</p>
      <nav class="mt-4 text-sm text-white/60 font-head"><a href="index.html" class="hover:text-green">Home</a> &nbsp;/&nbsp; <a href="curriculum.html" class="hover:text-green">Academics</a> &nbsp;/&nbsp; <span class="text-green">General Employees</span></nav>
    </div>
  </section>

  <section class="py-16 lg:py-20">
    <div class="max-w-4xl mx-auto px-4 lg:px-6">
      <div class="flex flex-wrap items-end justify-between gap-3 mb-6 reveal">
        <p class="text-lg text-body max-w-2xl">The dedicated support staff who keep our campus running smoothly every day.</p>
        <span id="count" class="text-lg font-head font-semibold text-brand"></span>
      </div>
      <div class="overflow-x-auto reveal">
        <table class="w-full text-lg border border-line rounded-lg overflow-hidden">
          <thead class="bg-navy text-white font-head">
            <tr>
              <th class="py-3 px-4 text-left w-16">Sl. No.</th>
              <th class="py-3 px-4 text-left">Name</th>
              <th class="py-3 px-4 text-left">Date of Joining</th>
              <th class="py-3 px-4 text-left">Designation</th>
            </tr>
          </thead>
          <tbody id="geBody"></tbody>
        </table>
      </div>
    </div>
  </section>

  <script>
    const GE = [
      ['Manikeshwari','01-07-2017','G.E'],
      ['Mallayya Swamy','01-06-2018','G.E'],
      ['Shivamma','01-07-2018','G.E'],
      ['Kanteeppa','01-06-2021','G.E'],
      ['Laxmi','06-06-2021','G.E'],
      ['Sapna','01-08-2022','G.E'],
      ['Dattu','01-06-2023','G.E'],
      ['Amruth','01-06-2023','G.E'],
      ['Sugnyani','01-06-2023','G.E'],
      ['Nandukumar','01-08-2023','G.E'],
      ['Swathi','01-06-2024','G.E'],
      ['Vidyawati','01-06-2024','G.E'],
      ['Veeresh','01-06-2024','G.E'],
      ['Veerkumar','01-06-2024','G.E'],
      ['Rahul','01-06-2024','G.E'],
      ['Santhosh','01-06-2024','G.E'],
      ['Umesh','20-01-2025','G.E'],
    ];
    document.getElementById('count').textContent = GE.length + ' employees';
    document.getElementById('geBody').innerHTML = GE.map(([name, doj, desig], i) => `
      <tr class="border-b border-line last:border-0 ${i%2?'bg-soft/50':''}">
        <td class="py-3 px-4 text-body">${i+1}</td>
        <td class="py-3 px-4 font-semibold text-navy">${name}</td>
        <td class="py-3 px-4 text-body">${doj}</td>
        <td class="py-3 px-4">${desig}</td>
      </tr>`).join('');
  </script>

</body>
</html>
